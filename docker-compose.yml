services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_RNCPaH3cp8fM@ep-weathered-sun-a4ye2wsw-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      GROQ_API_KEY: ${GROQ_API_KEY}
      DEBUG: "True"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
